<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BUNCHIN · 机に戻るための、AI同席ロボット</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html { scroll-behavior: smooth; }
  html, body { margin: 0; background: #050505; }
  body { -webkit-font-smoothing: antialiased; }
  #root { max-width: 1240px; margin: 0 auto; border-left: 1px solid #141414; border-right: 1px solid #141414; min-height: 100vh; overflow-x: clip; }
  ::selection { background: #FFE45C; color: #050505; }
  ::-webkit-scrollbar { width: 9px; }
  ::-webkit-scrollbar-thumb { background: #1c1c1c; }
  ::-webkit-scrollbar-track { background: #050505; }
  .navlink { transition: color 120ms; }
  .navlink:hover { color: #F7F3EA !important; }
  @media (max-width: 720px) { .topnav .navlink { display: none; } }
  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components/bunchin_sound.jsx"></script>
<script type="text/babel" src="components/PixelFace.jsx"></script>
<script type="text/babel" src="components/lp_shared.jsx"></script>
<script type="text/babel" src="components/lp_top.jsx"></script>
<script type="text/babel" src="components/lp_system.jsx"></script>
<script type="text/babel" src="components/lp_mid.jsx"></script>
<script type="text/babel" src="components/lp_demo.jsx"></script>
<script type="text/babel" src="components/lp_end.jsx"></script>

<script type="text/babel">
const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakToggle } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "device_mode": "インタラクティブ",
  "hero_grid": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const deviceMode = t.device_mode === "静止画" ? "static" : "interactive";

  return (
    <React.Fragment>
      <TopBar />
      <Hero deviceMode={deviceMode} heroGrid={t.hero_grid} />
      <Problem />
      <IsIsnt />
      <NameMeaning />
      <Ritual />
      <Target />
      <Comparison />
      <DeviceReveal />
      <DevStatus />
      <Tester />
      <Faq />
      <FinalCta />
      <Footer />

      <TweaksPanel title="Tweaks">
        <TweakSection label="デバイスの見せ方" />
        <TweakRadio label="ヒーロー" value={t.device_mode}
          options={["インタラクティブ", "静止画"]}
          onChange={(v) => setTweak("device_mode", v)} />
        <TweakSection label="背景" />
        <TweakToggle label="グリッド表示" value={t.hero_grid}
          onChange={(v) => setTweak("hero_grid", v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
